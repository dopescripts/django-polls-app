{% load django_vite %}
<!DOCTYPE html>
<html>
  <head>
    <title>Django Polls App</title>

    {% vite_hmr_client %}
    {% vite_asset 'frontend/style.css' %}

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">

        <!-- Brand -->
        <a href="/" class="text-xl font-bold text-indigo-600">
          PollsApp
        </a>

        <!-- Links -->
        <div class="flex items-center gap-6 text-sm font-medium">
          <a href="/" class="text-gray-600 hover:text-indigo-600 transition">
            Home
          </a>

          <a href="/polls/" class="text-gray-600 hover:text-indigo-600 transition">
            Polls
          </a>

          <a href="/admin/" class="text-gray-600 hover:text-indigo-600 transition">
            Admin
          </a>
        </div>

      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="flex-1">
      {% block content %}
      {% endblock content %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t border-gray-200 mt-10">
      <div class="max-w-6xl mx-auto px-4 py-6 text-center text-sm text-gray-500">

        <p>
          © {{ now|date:"Y" }} PollsApp. Built with Django + Vite + Tailwind.
        </p>

      </div>
    </footer>

    {% vite_asset 'frontend/index.js' %}
  </body>
</html>
